location / {
    proxy_pass                      https://localhost:8443;
      # UniFi uses a self-signed certificate on its internal HTTPS
    # listener — verification must be disabled or nginx will refuse
    # the connection and return 502.
    proxy_ssl_verify off;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts — UniFi can be slow to respond on first load while
    # the Java VM warms up.
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Do not rewrite Location: headers returned by UniFi — it issues
    # its own absolute redirects (e.g. /manage → /manage/index.html).
    proxy_redirect off;

    # Pass large request bodies (e.g. firmware uploads to controller)
    client_max_body_size 0;
}

location /wss/ {
    proxy_pass          https://localhost:8443;

    proxy_ssl_verify off;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host       $host;

    # Keep WebSocket connections alive for up to 24 h (live dashboard)
    proxy_read_timeout 86400s;

    proxy_buffering off;
}